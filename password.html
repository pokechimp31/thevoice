<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Password — The Voice</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  :root{--red:#c0392b;--bg:#faf6f1;--card:#fff;--border:#e0d6cb;--muted:#7a6e64;--font:'DM Sans',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:var(--font);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06);}
  svg{width:52px;height:52px;margin:0 auto 16px;display:block;}
  h1{font-size:22px;font-weight:600;color:var(--red);margin-bottom:8px;}
  p{font-size:14px;color:var(--muted);line-height:1.6;}
  .status{margin-top:20px;font-size:14px;color:var(--muted);}
  .btn{display:inline-block;margin-top:20px;background:var(--red);color:white;border:none;border-radius:8px;padding:10px 24px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="29" fill="#c0392b" stroke="#962d22" stroke-width="1.5"/><text x="30" y="42" text-anchor="middle" font-family="serif" font-size="32" font-weight="900" fill="white">P</text></svg>
  <h1>The Voice</h1>
  <p id="msg">Completing your password setup…</p>
  <div class="status" id="status"></div>
</div>
<script>
  netlifyIdentity.on('init', user => {
    const hash = window.location.hash;
    if (hash.includes('invite_token') || hash.includes('recovery_token') || hash.includes('confirmation_token')) {
      document.getElementById('msg').textContent = 'Please set your password in the popup that appears.';
      netlifyIdentity.open();
    } else if (user) {
      document.getElementById('msg').textContent = "You're already logged in!";
      document.getElementById('status').innerHTML = '<a class="btn" href="admin.html">Go to Admin Panel</a>';
    } else {
      document.getElementById('msg').textContent = 'This page handles password setup.';
      document.getElementById('status').innerHTML = '<a class="btn" href="admin.html">Go to Admin Login</a>';
    }
  });
  netlifyIdentity.on('login', () => {
    document.getElementById('msg').textContent = "Password set! You're now logged in.";
    document.getElementById('status').innerHTML = '<a class="btn" href="admin.html">Go to Admin Panel</a>';
    netlifyIdentity.close();
  });
</script>
</body>
</html>
