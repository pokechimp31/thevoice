<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Password — The Voice</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --red: #c0392b;
    --bg: #faf6f1;
    --card: #fff;
    --border: #e0d6cb;
    --muted: #7a6e64;
    --font: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: var(--font);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  svg { width: 52px; height: 52px; margin: 0 auto 16px; display: block; }
  h1 { font-size: 22px; font-weight: 600; color: var(--red); margin-bottom: 8px; }
  p { font-size: 14px; color: var(--muted); line-height: 1.6; }

  .form { margin-top: 24px; text-align: left; display: none; }
  .form label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
  .form input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font);
    font-size: 14px;
    background: var(--bg);
    margin-bottom: 16px;
    outline: none;
    transition: border-color .15s;
  }
  .form input:focus { border-color: var(--red); }

  .btn {
    display: inline-block;
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 11px 24px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .status {
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
  }
  .status.error { color: var(--red); }
  .status.success { color: #27ae60; }
</style>
</head>
<body>
<div class="card">
  <svg viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="29" fill="#c0392b" stroke="#962d22" stroke-width="1.5"/>
    <text x="30" y="42" text-anchor="middle" font-family="serif" font-size="32" font-weight="900" fill="white">P</text>
  </svg>
  <h1>The Voice</h1>
  <p id="msg">Verifying your link…</p>

  <div class="form" id="form">
    <label for="password">New password</label>
    <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
    <label for="confirm">Confirm password</label>
    <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
    <button class="btn" id="submit-btn">Set Password</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
  const SUPABASE_URL      = 'https://fcrghpinecvnxfcgfbbx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjcmdocGluZWN2bnhmY2dmYmJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzE2MjAsImV4cCI6MjA5Mzg0NzYyMH0.yRKPTYGSMet0e0HBKatI7cQ1JkdObt386b7uz3MRM_I';

  const { createClient } = window.supabase;
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const msgEl    = document.getElementById('msg');
  const formEl   = document.getElementById('form');
  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submit-btn');

  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + type;
  }

  // Supabase JS automatically reads the token from the URL hash and fires
  // PASSWORD_RECOVERY — no manual token exchange needed
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      msgEl.textContent = 'Enter your new password below.';
      formEl.style.display = 'block';
    }
  });

  // Show error immediately if there's no token in the URL at all
  const hash = window.location.hash;
  if (!hash.includes('recovery_token') && !hash.includes('invite_token') && !hash.includes('confirmation_token')) {
    msgEl.textContent = 'No recovery link detected.';
    setStatus('Please request a new password reset.', 'error');
  }

  submitBtn.addEventListener('click', async () => {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    if (password.length < 6) {
      setStatus('Password must be at least 6 characters.', 'error');
      return;
    }
    if (password !== confirm) {
      setStatus('Passwords do not match.', 'error');
      return;
    }

    submitBtn.disabled = true;
    setStatus('Saving…');

    const { error } = await supabase.auth.updateUser({ password });

    if (error) {
      setStatus(error.message, 'error');
      submitBtn.disabled = false;
    } else {
      setStatus('Password updated! Redirecting…', 'success');
      formEl.style.display = 'none';
      setTimeout(() => window.location.replace('admin.html'), 1500);
    }
  });
</script>
</body>
</html>
