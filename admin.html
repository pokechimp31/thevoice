<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Voice — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --red:#c0392b;--red-light:#f9eeec;--bg:#f4f1ed;--card:#fff;
    --border:#e0d6cb;--text:#2c2c2c;--muted:#7a6e64;--light:#a99e94;
    --radius:10px;--font:'DM Sans',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6}

  /* LOGIN */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}
  .login-logo{width:52px;height:52px;margin:0 auto 16px}
  .login-title{font-size:22px;font-weight:600;color:var(--red);margin-bottom:4px}
  .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
  .login-note{font-size:12px;color:var(--light);margin-top:16px}
  .login-form{text-align:left;margin-bottom:16px}
  .login-form label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px;margin-top:14px}
  .login-form label:first-child{margin-top:0}
  .login-form input{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s;background:white;color:var(--text)}
  .login-form input:focus{border-color:var(--red)}
  .login-error{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:8px 16px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s,background .15s}
  .btn:hover{opacity:.85}
  .btn-primary{background:var(--red);color:white;justify-content:center;padding:11px 20px}
  .btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
  .btn-sm{padding:5px 12px;font-size:12px}
  .btn-icon{background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;color:var(--muted);font-size:16px;transition:background .15s}
  .btn-icon:hover{background:var(--bg)}

  /* ADMIN LAYOUT */
  #admin-screen{display:none;min-height:100vh}
  .admin-header{background:var(--card);border-bottom:2px solid var(--red);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .admin-header-left{display:flex;align-items:center;gap:12px}
  .admin-logo-sm{width:32px;height:32px}
  .admin-title{font-size:16px;font-weight:600;color:var(--red)}
  .admin-subtitle{font-size:12px;color:var(--muted)}
  .admin-body{max-width:960px;margin:0 auto;padding:32px 24px 80px;display:flex;flex-direction:column;gap:28px}

  /* CARDS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .card-title{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .card-body{padding:20px}

  /* FORMS */
  label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px;margin-top:14px}
  label:first-child{margin-top:0}
  input[type=text],textarea,select{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s;background:white;color:var(--text)}
  input[type=text]:focus,textarea:focus,select:focus{border-color:var(--red)}
  textarea{resize:vertical;min-height:90px}

  /* TOGGLE */
  .toggle{position:relative;width:42px;height:24px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;inset:0;background:#ddd;border-radius:12px;cursor:pointer;transition:background .2s}
  .toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:transform .2s}
  .toggle input:checked + .toggle-slider{background:var(--red)}
  .toggle input:checked + .toggle-slider::before{transform:translateX(18px)}

  /* LIST ITEMS */
  .list-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
  .list-item:last-child{margin-bottom:0}
  .list-item-body{flex:1;min-width:0}
  .list-item-title{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-item-sub{font-size:12px;color:var(--muted)}
  .list-item-actions{display:flex;gap:4px;flex-shrink:0}
  .empty-state{text-align:center;padding:24px;color:var(--light);font-size:13px}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--card);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
  .modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:15px;font-weight:600}
  .modal-body{padding:20px}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

  /* SECTIONS */
  .section-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px}
  .section-item-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .section-name{font-weight:500;font-size:13px;flex:1}
  .section-stories-count{font-size:12px;color:var(--muted)}

  /* TOAST */
  #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#2c2c2c;color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.error{background:#c0392b}

  /* SAVE BAR */
  .save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 24px;display:flex;justify-content:center;gap:12px;z-index:60;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <svg class="login-logo" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="29" fill="#c0392b" stroke="#962d22" stroke-width="1.5"/>
      <text x="30" y="42" text-anchor="middle" font-family="serif" font-size="32" font-weight="900" fill="white">P</text>
    </svg>
    <div class="login-title">The Voice</div>
    <div class="login-sub">Admin Panel · The Pennington School</div>
    <div class="login-form">
      <label>Email</label>
      <input type="text" id="login-email" placeholder="you@pennington.org" autocomplete="email">
      <label>Password</label>
      <input type="text" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">Sign in</button>
    <div class="login-error" id="login-error"></div>
    <p class="login-note">Access is restricted to invited admins only.</p>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="admin-screen">
  <header class="admin-header">
    <div class="admin-header-left">
      <svg class="admin-logo-sm" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="29" fill="#c0392b" stroke="#962d22" stroke-width="1.5"/>
        <text x="30" y="42" text-anchor="middle" font-family="serif" font-size="32" font-weight="900" fill="white">P</text>
      </svg>
      <div>
        <div class="admin-title">The Voice — Admin</div>
        <div class="admin-subtitle" id="user-email">Pennington School</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="index.html" target="_blank" class="btn btn-secondary btn-sm">View live ↗</a>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sign out</button>
    </div>
  </header>

  <div class="admin-body">

    <!-- ISSUE INFO -->
    <div class="card">
      <div class="card-header"><span class="card-title">Issue info</span></div>
      <div class="card-body" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div><label>Issue date</label><input type="text" id="iss-date" placeholder="Thursday, May 7, 2026"></div>
        <div><label>Day label</label><input type="text" id="iss-day" placeholder="Day 1"></div>
        <div><label>Rotation</label><input type="text" id="iss-rotation" placeholder="Advisory"></div>
      </div>
    </div>

    <!-- ALERT BANNER -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Alert banner</span>
        <label class="toggle" title="Toggle banner visibility">
          <input type="checkbox" id="alert-enabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="card-body">
        <label>Banner text</label>
        <input type="text" id="alert-text" placeholder="e.g. AP Exams run May 4–22. Classes are not cancelled on exam days.">
      </div>
    </div>

    <!-- QUICK LINKS -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Quick links</span>
        <button class="btn btn-secondary btn-sm" onclick="openModal('link')">+ Add link</button>
      </div>
      <div class="card-body">
        <div id="links-list"><div class="empty-state">No links yet.</div></div>
      </div>
    </div>

    <!-- DEADLINES -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Deadline cards</span>
        <button class="btn btn-secondary btn-sm" onclick="openModal('deadline')">+ Add deadline</button>
      </div>
      <div class="card-body">
        <div id="deadlines-list"><div class="empty-state">No deadlines yet.</div></div>
      </div>
    </div>

    <!-- SECTIONS & STORIES -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Sections &amp; stories</span>
        <button class="btn btn-secondary btn-sm" onclick="openModal('section')">+ Add section</button>
      </div>
      <div class="card-body">
        <div id="sections-list"><div class="empty-state">No sections yet.</div></div>
      </div>
    </div>

  </div>

  <div class="save-bar">
    <button class="btn btn-secondary" onclick="loadAll()">↺ Discard changes</button>
    <button class="btn btn-primary" style="min-width:140px" id="save-btn" onclick="saveAll()">Save all changes</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add item</span>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save" style="min-width:100px">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── Config ────────────────────────────────────────────────────
  const SUPABASE_URL      = 'https://fcrghpinecvnxfcgfbbx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjcmdocGluZWN2bnhmY2dmYmJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzE2MjAsImV4cCI6MjA5Mzg0NzYyMH0.yRKPTYGSMet0e0HBKatI7cQ1JkdObt386b7uz3MRM_I';

  const { createClient } = window.supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let state = { issue:{}, alert:{}, links:[], deadlines:[], sections:[], stories:[] };
  let editingModal = null;

  // ── Auth ──────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      showAdmin();
      loadAll();
    }
  });

  async function login() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    errEl.textContent = '';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      return;
    }
    currentUser = data.user;
    showAdmin();
    loadAll();
  }

  async function logout() {
    await sb.auth.signOut();
    currentUser = null;
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    document.getElementById('user-email').textContent = currentUser?.email || '';
  }

  // Allow pressing Enter to log in
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
      login();
    }
  });

  // ── API Helpers ───────────────────────────────────────────────
  async function dbGet(table, qs = '') {
    const { data, error } = await sb.from(table).select('*');
    if (error) throw error;
    return data;
  }

  async function dbUpsert(table, rows) {
    if (!rows.length) return;
    const { error } = await sb.from(table).upsert(rows);
    if (error) throw error;
  }

  async function dbDelete(table, id) {
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) throw error;
  }

  // ── Load ──────────────────────────────────────────────────────
  async function loadAll() {
    try {
      const [issue, alert, links, deadlines, sections, stories] = await Promise.all([
        sb.from('issue').select('*').order('id', { ascending: false }).limit(1),
        sb.from('alert').select('*').limit(1),
        sb.from('quick_links').select('*').order('sort_order'),
        sb.from('deadlines').select('*').order('sort_order'),
        sb.from('sections').select('*').order('sort_order'),
        sb.from('stories').select('*').order('sort_order'),
      ]);
      state.issue     = issue.data[0]     || {};
      state.alert     = alert.data[0]     || { enabled: false, text: '' };
      state.links     = links.data        || [];
      state.deadlines = deadlines.data    || [];
      state.sections  = sections.data     || [];
      state.stories   = stories.data      || [];
      renderAll();
    } catch (e) {
      showToast('Failed to load data', true);
      console.error(e);
    }
  }

  // ── Render ────────────────────────────────────────────────────
  function renderAll() {
    document.getElementById('iss-date').value     = state.issue.issue_date   || '';
    document.getElementById('iss-day').value      = state.issue.day_label    || '';
    document.getElementById('iss-rotation').value = state.issue.rotation_day || '';
    document.getElementById('alert-enabled').checked = !!state.alert.enabled;
    document.getElementById('alert-text').value       = state.alert.text || '';

    const ll = document.getElementById('links-list');
    ll.innerHTML = state.links.length
      ? state.links.map((l, i) => `
        <div class="list-item">
          <div class="list-item-body">
            <div class="list-item-title">${esc(l.emoji || '')} ${esc(l.label)}</div>
            <div class="list-item-sub">${esc(l.url)}</div>
          </div>
          <div class="list-item-actions">
            <button class="btn-icon" onclick="openModal('link',${i})">✏️</button>
            <button class="btn-icon" onclick="removeItem('links',${i})">🗑️</button>
          </div>
        </div>`).join('')
      : '<div class="empty-state">No links yet.</div>';

    const dl = document.getElementById('deadlines-list');
    dl.innerHTML = state.deadlines.length
      ? state.deadlines.map((d, i) => `
        <div class="list-item">
          <div class="list-item-body">
            <div class="list-item-title">${esc(d.title)}</div>
            <div class="list-item-sub">${esc(d.date_label)}</div>
          </div>
          <div class="list-item-actions">
            <button class="btn-icon" onclick="openModal('deadline',${i})">✏️</button>
            <button class="btn-icon" onclick="removeItem('deadlines',${i})">🗑️</button>
          </div>
        </div>`).join('')
      : '<div class="empty-state">No deadlines yet.</div>';

    const sl = document.getElementById('sections-list');
    sl.innerHTML = state.sections.length
      ? state.sections.map((sec, si) => {
          const ss = state.stories.filter(s => s.section_id === sec.id);
          return `<div class="section-item">
            <div class="section-item-header">
              <span class="section-name">${esc(sec.name)}</span>
              <span class="section-stories-count">${ss.length} stor${ss.length === 1 ? 'y' : 'ies'}</span>
              <button class="btn btn-secondary btn-sm" onclick="openModal('story',null,'${sec.id}')">+ Story</button>
              <button class="btn-icon" onclick="openModal('section',${si})">✏️</button>
              <button class="btn-icon" onclick="removeItem('sections',${si})">🗑️</button>
            </div>
            ${ss.map(s => `
              <div class="list-item" style="margin-top:8px">
                <div class="list-item-body">
                  <div class="list-item-title">${esc(s.title)}</div>
                  <div class="list-item-sub">${esc(s.preview || '')}</div>
                </div>
                <div class="list-item-actions">
                  <button class="btn-icon" onclick="openModal('story',${storyIdx(s.id)})">✏️</button>
                  <button class="btn-icon" onclick="removeItem('stories',${storyIdx(s.id)})">🗑️</button>
                </div>
              </div>`).join('')}
          </div>`;
        }).join('')
      : '<div class="empty-state">No sections yet.</div>';
  }

  function storyIdx(id) { return state.stories.findIndex(s => s.id === id); }

  // ── Save All ──────────────────────────────────────────────────
  async function saveAll() {
    const btn = document.getElementById('save-btn');
    btn.textContent = 'Saving…';
    btn.disabled = true;

    state.issue.issue_date   = document.getElementById('iss-date').value;
    state.issue.day_label    = document.getElementById('iss-day').value;
    state.issue.rotation_day = document.getElementById('iss-rotation').value;
    state.alert.enabled      = document.getElementById('alert-enabled').checked;
    state.alert.text         = document.getElementById('alert-text').value;

    state.links.forEach((l, i)     => l.sort_order = i);
    state.deadlines.forEach((d, i) => d.sort_order = i);
    state.sections.forEach((s, i)  => s.sort_order = i);
    state.stories.forEach((s, i)   => s.sort_order = i);

    try {
      await Promise.all([
        dbUpsert('issue',       [state.issue]),
        dbUpsert('alert',       [state.alert]),
        dbUpsert('quick_links', state.links),
        dbUpsert('deadlines',   state.deadlines),
        dbUpsert('sections',    state.sections),
        dbUpsert('stories',     state.stories),
      ]);
      showToast('All changes saved ✓');
    } catch (e) {
      showToast('Save failed — check console', true);
      console.error(e);
    } finally {
      btn.textContent = 'Save all changes';
      btn.disabled = false;
    }
  }

  // ── Remove ────────────────────────────────────────────────────
  async function removeItem(type, idx) {
    const arr  = state[type];
    const item = arr[idx];
    const dbTable = type === 'links' ? 'quick_links' : type;
    if (item?.id) await dbDelete(dbTable, item.id);
    arr.splice(idx, 1);
    renderAll();
  }

  // ── Modal ─────────────────────────────────────────────────────
  function openModal(type, idx = null, sectionId = null) {
    editingModal = { type, idx, sectionId };
    const title = document.getElementById('modal-title');
    const body  = document.getElementById('modal-body');
    const arr   = type === 'link' ? 'links' : type === 'deadline' ? 'deadlines' : type === 'section' ? 'sections' : 'stories';
    const data  = idx !== null ? state[arr][idx] : {};

    if (type === 'link') {
      title.textContent = idx !== null ? 'Edit quick link' : 'Add quick link';
      body.innerHTML = `
        <label>Emoji (optional)</label><input type="text" id="m-emoji" value="${esc(data.emoji||'')}" placeholder="🍽️">
        <label>Label</label><input type="text" id="m-label" value="${esc(data.label||'')}" placeholder="Dining Hall Menu">
        <label>URL</label><input type="text" id="m-url" value="${esc(data.url||'')}" placeholder="https://…">`;
      document.getElementById('modal-save').onclick = saveLink;

    } else if (type === 'deadline') {
      title.textContent = idx !== null ? 'Edit deadline' : 'Add deadline';
      body.innerHTML = `
        <label>Date label</label><input type="text" id="m-date" value="${esc(data.date_label||'')}" placeholder="Today · May 7">
        <label>Title</label><input type="text" id="m-title" value="${esc(data.title||'')}" placeholder="Advisor Change Form due by 3 PM">`;
      document.getElementById('modal-save').onclick = saveDeadline;

    } else if (type === 'section') {
      title.textContent = idx !== null ? 'Edit section' : 'Add section';
      body.innerHTML = `
        <label>Section name</label><input type="text" id="m-sname" value="${esc(data.name||'')}" placeholder="All school">`;
      document.getElementById('modal-save').onclick = saveSection;

    } else if (type === 'story') {
      title.textContent = idx !== null ? 'Edit story' : 'Add story';
      const secOpts = state.sections.map(s =>
        `<option value="${s.id}" ${(data.section_id===s.id || sectionId===s.id) ? 'selected' : ''}>${esc(s.name)}</option>`
      ).join('');
      body.innerHTML = `
        <label>Section</label><select id="m-secid">${secOpts}</select>
        <label>Title</label><input type="text" id="m-stitle" value="${esc(data.title||'')}" placeholder="Story headline">
        <label>Preview line (shown collapsed)</label><input type="text" id="m-spreview" value="${esc(data.preview||'')}" placeholder="Date · Location · Key detail">
        <label>Badge (optional, e.g. "Tonight")</label><input type="text" id="m-sbadge" value="${esc(data.badge||'')}" placeholder="Tonight">
        <label>Body HTML</label>
        <textarea id="m-sbody" rows="8">${data.body_html ? data.body_html.replace(/</g,'&lt;') : ''}</textarea>
        <p style="font-size:11px;color:var(--muted);margin-top:6px">Use &lt;p&gt; for paragraphs, &lt;ul&gt;&lt;li&gt; for bullets, &lt;strong&gt; for bold, &lt;a href="…"&gt; for links.</p>`;
      document.getElementById('modal-save').onclick = saveStory;
    }

    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal()      { document.getElementById('modal-overlay').classList.remove('open'); }
  function closeModalOnBg(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

  function saveLink() {
    const obj = { emoji: v('m-emoji'), label: v('m-label'), url: v('m-url') };
    if (!obj.label || !obj.url) return alert('Label and URL are required.');
    if (editingModal.idx !== null) Object.assign(state.links[editingModal.idx], obj);
    else state.links.push(obj);
    closeModal(); renderAll();
  }
  function saveDeadline() {
    const obj = { date_label: v('m-date'), title: v('m-title') };
    if (!obj.title) return alert('Title is required.');
    if (editingModal.idx !== null) Object.assign(state.deadlines[editingModal.idx], obj);
    else state.deadlines.push(obj);
    closeModal(); renderAll();
  }
  function saveSection() {
    const obj = { name: v('m-sname') };
    if (!obj.name) return alert('Name is required.');
    if (editingModal.idx !== null) Object.assign(state.sections[editingModal.idx], obj);
    else state.sections.push({ ...obj, id: 'sec_' + Date.now() });
    closeModal(); renderAll();
  }
  function saveStory() {
    const rawBody = document.getElementById('m-sbody').value;
    const obj = {
      section_id: v('m-secid'),
      title:      v('m-stitle'),
      preview:    v('m-spreview'),
      badge:      v('m-sbadge'),
      body_html:  rawBody.replace(/&lt;/g, '<').replace(/&gt;/g, '>'),
    };
    if (!obj.title) return alert('Title is required.');
    if (editingModal.idx !== null) Object.assign(state.stories[editingModal.idx], obj);
    else state.stories.push(obj);
    closeModal(); renderAll();
  }

  // ── Utilities ─────────────────────────────────────────────────
  function v(id)  { return document.getElementById(id)?.value.trim() || ''; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error' : '';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
